services:
  crm:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - crm-data:/app/data
      - crm-uploads:/app/uploads
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8080/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      crm:
        condition: service_healthy
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  crm-data:
  crm-uploads:
  caddy-data:
  caddy-config:
